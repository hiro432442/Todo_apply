name: Send Push Notifications Cron
on:
  schedule:
    # Run every minute
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Push API
        run: |
          curl -X POST ${{ secrets.VERCEL_PUSH_API_URL }} \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
